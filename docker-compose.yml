version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: nexusai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexusai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexusai-network

  # Redis for Caching & Sessions
  redis:
    image: redis:7-alpine
    container_name: nexusai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexusai-network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nexusai-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/nexusai
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: development
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - nexusai-network
    profiles:
      - dev
      - all

  # React Frontend (optional, can serve static build)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexusai-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - nexusai-network
    profiles:
      - dev
      - all

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  nexusai-network:
    driver: bridge

# Usage:
# docker-compose up                    # Start all services
# docker-compose up -d                 # Start in background
# docker-compose stop                  # Stop all services
# docker-compose down                  # Remove all services
# docker-compose down -v               # Remove services and volumes
# docker-compose logs -f               # Follow logs
# docker-compose logs backend          # Backend logs only
