{% extends 'base.html' %}

{% block content %}
<h1>🤖 AI Smart Assistant</h1>

<div class="chat-box" id="chat-box">
    {% for msg in history %}
    <div class="message {{ 'user-message' if msg.role == 'user' else 'ai-message' }}">
        {{ msg.content }}
    </div>
    {% endfor %}

    {% if not history %}
    <div class="message ai-message">
        Hello! I am your AI assistant. How can I help you today?
    </div>
    {% endif %}

    {% if error %}
    <div class="message ai-message" style="border-color: #ef4444; color: #ef4444;">
        ⚠️ {{ error }}
    </div>
    {% endif %}
</div>

<form method="POST" class="input-area" id="chat-form">
    <textarea name="user_input" id="user-input" placeholder="Type your message..." rows="1" required></textarea>
    <button type="submit" id="send-btn">Send</button>
</form>

<div id="loading-state"
    style="display: none; margin-top: 15px; color: var(--text-muted); font-size: 0.9rem; text-align: center; animation: fadeIn 0.3s ease-out;">
    <span class="spinner"></span> AI is thinking...
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    chatBox.scrollTop = chatBox.scrollHeight;

    const textarea = document.getElementById('user-input');
    const form = document.getElementById('chat-form');
    const loading = document.getElementById('loading-state');
    const sendBtn = document.getElementById('send-btn');

    textarea.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });

    form.addEventListener('submit', function () {
        loading.style.display = 'block';
        sendBtn.disabled = true;
        sendBtn.style.opacity = '0.5';
        textarea.readOnly = true;
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    textarea.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            form.dispatchEvent(new Event('submit'));
            form.submit();
        }
    });
</script>
{% endblock %}
